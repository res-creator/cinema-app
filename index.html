<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Glodeni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; background: #000; font-family: 'Montserrat', sans-serif; 
            color: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; 
        }
        .screen { width: 100%; min-height: 100vh; display: none; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* КНОПКИ (КРАСНЫЕ И ЧЕРНЫЕ) */
        .btn-red { 
            background: #D20F16; color: #fff; border: none; padding: 14px 20px; 
            border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-red:active { transform: scale(0.96); background: #b00c12; }
        
        .btn-black { 
            background: rgba(0,0,0,0.5); border: 1px solid #333; color: #999; 
            padding: 8px 16px; border-radius: 12px; font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .btn-black.active { border-color: #D20F16; color: #fff; background: rgba(210, 15, 22, 0.1); }

        /* НАВИГАЦИЯ (НИЖНЯЯ - ПО НОВОМУ МАКЕТУ) */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; 
            align-items: center; padding: 12px 0 20px; background: rgba(5,5,5,0.9); 
            border-top: 0.5px solid #111; backdrop-filter: blur(15px); border-radius: 24px 24px 0 0; 
        }
        .nav-item { font-size: 9px; color: #555; cursor: pointer; text-align: center; font-weight: 500;}
        .nav-item.active { color: #D20F16; font-weight: 600; }
        .nav-item .icon-dot { width: 6px; height: 6px; background: #555; border-radius: 50%; display: block; margin: 0 auto 4px; transition: 0.3s; }
        .nav-item.active .icon-dot { background: #D20F16; transform: scale(1.5); }

        /* --- ЭКРАН 1: ГЛАВНЫЙ (КРАСНЫЙ СПАРРОУ) --- */
        .hero-banner { width: 100%; height: 350px; background-size: cover; background-position: center; }
        .hero-details { padding: 16px; margin-top: -30px; border-radius: 20px; }
        .film-tags { display: flex; gap: 6px; justify-content: center; margin: 10px 0 20px; font-size: 9px; color: #888; }
        .film-tag { border: 1px solid #333; padding: 4px 8px; border-radius: 6px; }
        .movie-list-item { 
            width: 140px; height: 180px; border-radius: 20px; background-size: cover; 
            margin: 0 auto 10px; border: 1px solid #222; 
        }
        .movie-label-small { text-align: center; color: #999; font-size: 11px; margin-top: 5px; }

        /* --- ЭКРАН 2: ВЫБОР МЕСТ (50 ШТУК + ДИЗАЙН) --- */
        .header-alt { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .alt-title { font-size: 16px; font-weight: 600; text-align: center; flex: 1; }
        .back-icon { font-size: 20px; color: #D20F16; cursor: pointer; }

        .cinema-screen { 
            width: 70%; height: 1.5px; background: #D20F16; margin: 30px auto 10px; 
            box-shadow: 0 5px 20px rgba(210, 15, 22, 0.4); 
        }
        
        .seats-grid-alt { 
            padding: 20px; display: flex; flex-direction: column; gap: 6px; 
            align-items: center; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; 
        }
        .seat-row { display: flex; gap: 6px; }
        .seat-alt { width: 26px; height: 26px; background: #2A2A2A; border-radius: 6px; cursor: pointer; transition: 0.1s; flex-shrink: 0; }
        .seat-alt:active { transform: scale(0.9); }
        .seat-alt.selected { background: #D20F16; }

        .date-picker { padding: 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .date-item { 
            width: 50px; flex-shrink: 0; text-align: center; padding: 12px 8px; 
            border: 1px solid #2A2A2A; border-radius: 12px; cursor: pointer; color: #666; 
        }
        .date-item.active { border-color: #D20F16; color: #fff; background: rgba(210, 15, 22, 0.05); }
        .date-day { font-size: 11px; margin-bottom: 4px; }
        .date-num { font-size: 16px; font-weight: 700; }

        .time-picker { display: flex; gap: 8px; padding: 10px; overflow-x: auto; scrollbar-width: none; }
        
        .checkout-bar { 
            margin-top: auto; padding: 16px 20px 80px; display: flex; 
            justify-content: space-between; align-items: center; border-top: 0.5px solid #111; 
        }
        .price-label { font-size: 12px; color: #666; margin-bottom: 3px; }
        .price-value { font-size: 18px; font-weight: 700; color: #fff; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="hero-banner" style="background-image: url('hero.jpg');"></div>
        
        <div class="hero-details">
            <div style="font-size: 12px; color: #888; text-align: center;">NEW - MOVIE</div>
            <div style="font-size: 24px; font-weight: 700; text-align: center; margin: 4px 0 10px;">Red Sparrow</div>
            
            <div class="film-tags">
                <span class="film-tag">Action</span>
                <span class="film-tag">Drama</span>
                <span class="film-tag">Thriller</span>
            </div>
            
            <div style="text-align: center; margin-bottom: 25px;">
                <button class="btn-red" onclick="showSeats()">Buy tickets</button>
            </div>
            
            <div style="padding: 10px;">
                <div class="movie-list-item" style="background-image: url('poster_small.jpg');"></div>
                <div class="movie-label-small">Red Sparrow</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><span class="icon-dot"></span>Movie</div>
            <div class="nav-item"><span class="icon-dot"></span>Search</div>
            <div class="nav-item"><span class="icon-dot"></span>Tickets</div>
            <div class="nav-item"><span class="icon-dot"></span>Profile</div>
        </div>
    </div>

    <div id="seats" class="screen">
        <div class="header-alt">
            <div class="back-icon" onclick="showHome()">←</div>
            <div class="alt-title">Red Sparrow</div>
            <div style="width: 20px;"></div>
        </div>
        
        <div class="cinema-screen"></div>
        <div style="text-align: center; font-size: 10px; color: #333; margin-top: 15px;">SCREEN</div>
        
        <div class="seats-grid-alt" id="seatsGrid">
            </div>
        
        <div class="date-picker">
            <div class="date-item"><div class="date-day">May</div><div class="date-num">05</div></div>
            <div class="date-item active"><div class="date-day">May</div><div class="date-num">06</div></div>
            <div class="date-item"><div class="date-day">May</div><div class="date-num">07</div></div>
            <div class="date-item"><div class="date-day">May</div><div class="date-num">08</div></div>
            <div class="date-item"><div class="date-day">May</div><div class="date-num">09</div></div>
        </div>
        
        <div class="time-picker">
            <button class="btn-black">10:40</button>
            <button class="btn-black">13:30</button>
            <button class="btn-black active">17:10</button>
            <button class="btn-black">19:30</button>
        </div>
        
        <div class="checkout-bar">
            <div>
                <div class="price-label"><span id="seatsCount">0</span> tickets</div>
                <div class="price-value">$<span id="totalPrice">0.00</span></div>
            </div>
            <button class="btn-red" style="border-radius: 12px; padding: 12px 30px;">Buy tickets</button>
        </div>
        
    </div>

    <script>
        // Функция переключения экранов
        function showSeats() {
            document.getElementById('home').classList.remove('active');
            document.getElementById('seats').classList.add('active');
            window.scrollTo(0,0);
        }
        function showHome() {
            document.getElementById('seats').classList.remove('active');
            document.getElementById('home').classList.add('active');
        }

        // ГЕНЕРАЦИЯ 50 МЕСТ (5 рядов по 10 мест)
        const grid = document.getElementById('seatsGrid');
        const pricePerSeat = 25.00;
        let selectedSeatsCount = 0;

        for (let row = 0; row < 5; row++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'seat-row';

            for (let seat = 0; seat < 10; seat++) {
                // Добавляем проход посередине
                if (seat === 5) {
                    const spacer = document.createElement('div');
                    spacer.style.width = '15px';
                    rowDiv.appendChild(spacer);
                }

                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat-alt';
                
                // Обработка нажатия на место
                seatDiv.onclick = function() {
                    this.classList.toggle('selected');
                    updatePrice(this.classList.contains('selected'));
                };
                rowDiv.appendChild(seatDiv);
            }
            grid.appendChild(rowDiv);
        }

        // Функция обновления цены
        function updatePrice(isSelected) {
            selectedSeatsCount += isSelected ? 1 : -1;
            document.getElementById('seatsCount').innerText = selectedSeatsCount;
            document.getElementById('totalPrice').innerText = (selectedSeatsCount * pricePerSeat).toFixed(2);
        }

        // Логика активных кнопок времени
        const timeBtns = document.querySelectorAll('.time-picker .btn-black');
        timeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                timeBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // Логика активных дат
        const dateItems = document.querySelectorAll('.date-picker .date-item');
        dateItems.forEach(item => {
            item.addEventListener('click', function() {
                dateItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
