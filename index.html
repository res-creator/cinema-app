<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Glodeni</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --main-violet: #8454CC;
            --text-white: #FFFFFF;
            --text-gray: #666666;
            --border-gray: #1C1C1E;
        }

        body { 
            margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; 
            color: var(--text-white); overflow: hidden; -webkit-font-smoothing: antialiased; 
        }
        
        .screen { width: 100%; height: 100vh; display: none; flex-direction: column; position: relative; }
        .screen.active { display: flex; }

        /* --- ЭКРАН 0: ONBOARDING (НОВЫЙ) --- */
        #onboarding {
            background: url('hero.jpg') no-repeat center top;
            background-size: cover;
        }
        .onboarding-content {
            margin-top: auto;
            padding: 40px 24px 60px;
            background: linear-gradient(to top, var(--bg-black) 70%, transparent);
            text-align: center;
        }
        .onboarding-title { font-size: 32px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
        .onboarding-text { font-size: 14px; color: var(--text-gray); margin-bottom: 40px; line-height: 1.5; }

        /* --- ОБЩИЕ СТИЛИ КНОПОК --- */
        .btn-main { 
            background: var(--main-violet); color: #fff; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; 
            cursor: pointer; width: 100%; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* --- ЭКРАН 1: ГЛАВНАЯ --- */
        .header { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .hero-card { 
            margin: 0 16px; height: 300px; border-radius: 24px; 
            background: url('hero.jpg') center; background-size: cover;
            position: relative; overflow: hidden;
        }
        .hero-card-info {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }

        /* --- ЭКРАН 2: ВЫБОР МЕСТ --- */
        .seats-container { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .cinema-screen { 
            width: 80%; height: 2px; background: var(--main-violet); margin: 20px auto;
            box-shadow: 0 4px 15px rgba(132, 84, 204, 0.6);
        }
        .seats-grid { display: grid; gap: 8px; justify-content: center; margin-top: 30px; }
        .seat-row { display: flex; gap: 8px; }
        .seat { width: 28px; height: 28px; background: #1C1C1E; border-radius: 6px; border: 1px solid #333; }
        .seat.selected { background: var(--main-violet); border-color: var(--main-violet); }
        .seat.reserved { background: #333; opacity: 0.3; }

        /* НИЖНЯЯ ПАНЕЛЬ ОПЛАТЫ */
        .bottom-bar {
            padding: 20px 24px 40px;
            background: #050505; border-top: 1px solid var(--border-gray);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* НАВИГАЦИЯ (ДЛЯ ГЛАВНОЙ) */
        .nav {
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around;
            padding: 15px 0 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .nav-dot { width: 6px; height: 6px; background: var(--text-gray); border-radius: 50%; }
        .nav-dot.active { background: var(--main-violet); box-shadow: 0 0 10px var(--main-violet); }
    </style>
</head>
<body>

    <div id="onboarding" class="screen active">
        <div class="onboarding-content">
            <h1 class="onboarding-title">Enjoy your favorite movie</h1>
            <p class="onboarding-text">The best cinema app in Glodeni. <br>Book your tickets in seconds.</p>
            <button class="btn-main" onclick="goTo('home')">Get Started</button>
        </div>
    </div>

    <div id="home" class="screen">
        <div class="header">
            <span style="font-weight: 700; font-size: 20px;">CinéCity</span>
            <div style="width: 32px; height: 32px; background: #222; border-radius: 50%;"></div>
        </div>
        <div class="hero-card" onclick="goTo('seats')">
            <div class="hero-card-info">
                <div style="font-size: 12px; color: var(--main-violet); font-weight: 700; margin-bottom: 4px;">NOW SHOWING</div>
                <div style="font-size: 22px; font-weight: 800;">Red Sparrow</div>
            </div>
        </div>
        <div style="padding: 24px 16px;">
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 16px;">Coming Soon</div>
            <div style="width: 140px; height: 180px; background: #111; border-radius: 20px; border: 1px solid #222;"></div>
        </div>
        <div class="nav">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
    </div>

    <div id="seats" class="screen">
        <div class="header">
            <span onclick="goTo('home')" style="color: var(--main-violet); font-weight: 600;">← Back</span>
            <span style="font-weight: 700;">Select Seats</span>
            <div style="width: 40px;"></div>
        </div>
        <div class="cinema-screen"></div>
        <div class="seats-container">
            <div class="seats-grid" id="grid"></div>
        </div>
        <div class="bottom-bar">
            <div>
                <div style="font-size: 12px; color: var(--text-gray);">Total Price</div>
                <div style="font-size: 20px; font-weight: 800;">$<span id="price">0</span></div>
            </div>
            <button class="btn-main" style="width: auto; padding: 14px 30px; border-radius: 12px;">Buy</button>
        </div>
    </div>

    <script>
        function goTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Генерация 50 мест
        const grid = document.getElementById('grid');
        let total = 0;
        for (let r = 0; r < 5; r++) {
            const row = document.createElement('div');
            row.className = 'seat-row';
            for (let s = 0; s < 10; s++) {
                if (s === 5) { // Проход
                    const space = document.createElement('div');
                    space.style.width = '12px';
                    row.appendChild(space);
                }
                const seat = document.createElement('div');
                seat.className = 'seat';
                if (Math.random() < 0.2) seat.classList.add('reserved');
                else {
                    seat.onclick = function() {
                        this.classList.toggle('selected');
                        total += this.classList.contains('selected') ? 25 : -25;
                        document.getElementById('price').innerText = total;
                    }
                }
                row.appendChild(seat);
            }
            grid.appendChild(row);
        }
    </script>
</body>
</html>
