<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Glodeni</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0d0d0d; font-family: 'Outfit', sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }
        .screen { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        .home-header { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .home-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #c9a84c; }
        .home-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #c9a84c; display: flex; align-items: center; justify-content: center; color: #c9a84c; }
        .hero-img { width: 100%; height: 200px; background: linear-gradient(135deg,#1a0a00,#2d1500); display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 24px; }
        .section-title { padding: 20px 16px 10px; font-weight: 500; color: #ddd; }
        .movie-row { display: flex; gap: 15px; padding: 0 16px 20px; overflow-x: auto; }
        .movie-card { flex-shrink: 0; width: 120px; }
        .movie-poster { width: 120px; height: 160px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; }
        .buy-btn { margin: 0 16px 20px; background: #c9a84c; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 14px; }
        .bottom-nav { margin-top: auto; display: flex; justify-content: space-around; padding: 15px 0; background: #0a0a0a; border-top: 0.5px solid #1e1e1e; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="home-header">
            <div>
                <div class="home-logo">CinéCity</div>
                <div style="font-size: 11px; color: #666;">Глодяны • MD</div>
            </div>
            <div class="home-avatar">АН</div>
        </div>
        <div class="hero-img">
            <div class="hero-title">Dune: Part Two</div>
        </div>
        <div class="section-title">Сейчас в кино</div>
        <div class="movie-row">
            <div class="movie-card"><div class="movie-poster"></div><div style="font-size: 12px; margin-top: 8px;">Oppenheimer</div></div>
            <div class="movie-card"><div class="movie-poster"></div><div style="font-size: 12px; margin-top: 8px;">Poor Things</div></div>
        </div>
        <button class="buy-btn">Купить билет</button>
        <div class="bottom-nav">
            <span style="color: #c9a84c;">🏠</span>
            <span>🎬</span>
            <span>🎫</span>
            <span>👤</span>
        </div>
    </div>
</body>
</html>
