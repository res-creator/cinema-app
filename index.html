<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Netflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --red: #E50914; --bg: #000; --card: #141414; }
        
        /* Базовые настройки, чтобы ничего не дергалось */
        html, body { 
            margin: 0; padding: 0; background: var(--bg); 
            font-family: 'Roboto', sans-serif; color: #fff; 
            height: 100%; overflow: hidden; /* Запрещаем скролл всему телу */
        }

        /* Каждый экран — это отдельный слой со своим скроллом */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; 
            overflow-y: auto; /* ВКЛЮЧАЕМ СКРОЛЛ ТУТ */
            -webkit-overflow-scrolling: touch;
            background: var(--bg);
            padding-bottom: 100px; /* Чтобы контент не перекрывался нижней навигацией */
            box-sizing: border-box;
        }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .top-bar { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            display: flex; align-items: center; padding: 15px 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }
        .back-btn { cursor: pointer; background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; margin-right: 15px; border: none; color: white; }
        .logo { color: var(--red); font-weight: 900; font-size: 24px; flex-grow: 1; }

        /* ГЛАВНЫЙ БАННЕР */
        .hero { 
            width: 100%; min-height: 70vh; /* Минимальная высота баннера */
            background: linear-gradient(to top, var(--bg), transparent 50%), url('./main_hero.jpg') center top; 
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px; 
        }
        .hero-title { font-size: 42px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.8); text-align: center; }

        .btn-play { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 4px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px; }
        .btn-list { background: rgba(255, 255, 255, 0.25); color: #fff; border: none; padding: 12px 15px; border-radius: 4px; backdrop-filter: blur(10px); }

        /* КОНТЕНТ */
        .row-title { padding: 25px 20px 10px; font-size: 19px; font-weight: 700; }
        .movie-row { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 20px; scrollbar-width: none; }
        .movie-row::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 135px; height: 200px; background: var(--card); border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; cursor: pointer; }

        /* КРЕСЛА */
        .grid { display: flex; flex-direction: column; gap: 10px; align-items: center; padding: 20px; margin-top: 20px; }
        .row { display: flex; gap: 8px; }
        .seat { width: 32px; height: 32px; border: 1px solid #444; border-radius: 4px; background: #1a1a1a; }
        .seat.selected { background: var(--red); border-color: var(--red); box-shadow: 0 0 12px rgba(229, 9, 20, 0.5); }
        .seat.occupied { opacity: 0.15; pointer-events: none; }

        /* ОПЛАТА */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 1000; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: #181818; border-radius: 15px 15px 0 0; padding: 35px 25px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001; text-align: center; box-sizing: border-box; border-top: 1px solid #333; }
        .modal.active { bottom: 0; }
        .overlay.active { display: block; }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0 35px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; z-index: 90; }
        .nav-item { color: #757575; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="top-bar">
            <div class="logo">CinéCity</div>
            <i data-lucide="search" size="24"></i>
        </div>
        
        <div class="hero">
            <h1 class="hero-title">Дюна: Часть 2</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn-play" onclick="openDetails('main_hero.jpg', 'Дюна: Часть вторая')">
                    <i data-lucide="play" fill="black"></i> Билеты
                </button>
                <button class="btn-list"><i data-lucide="plus"></i></button>
            </div>
        </div>

        <div class="row-title">Сейчас в кино</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film1.jpg')" onclick="openDetails('film1.jpg', 'Оппенгеймер')"></div>
            <div class="movie-card" style="background-image: url('film2.jpg')" onclick="openDetails('film2.jpg', 'Бэтмен')"></div>
            <div class="movie-card" style="background-image: url('film3.jpg')" onclick="openDetails('film3.jpg', 'Джон Уик 4')"></div>
            <div class="movie-card" style="background-image: url('film4.jpg')" onclick="openDetails('film4.jpg', 'Человек-паук')"></div>
        </div>

        <div class="row-title">Рекомендуем вам</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film5.jpg')" onclick="openDetails('film5.jpg', 'Интерстеллар')"></div>
            <div class="movie-card" style="background-image: url('film6.jpg')" onclick="openDetails('film6.jpg', 'Начало')"></div>
            <div class="movie-card" style="background-image: url('film7.jpg')" onclick="openDetails('film7.jpg', 'Бегущий по лезвию')"></div>
            <div class="movie-card" style="background-image: url('film8.jpg')" onclick="openDetails('film8.jpg', 'Аватар 2')"></div>
        </div>
        
        <div class="nav">
            <div class="nav-item active"><i data-lucide="home"></i><br>Главная</div>
            <div class="nav-item"><i data-lucide="compass"></i><br>Обзор</div>
            <div class="nav-item"><i data-lucide="user"></i><br>Профиль</div>
        </div>
    </div>

    <div id="details" class="screen">
        <div class="top-bar">
            <button class="back-btn" onclick="showScreen('home')"><i data-lucide="arrow-left"></i></button>
        </div>
        <div id="detImg" style="width: 100%; height: 50vh; background-size: cover; background-position: center;"></div>
        <div style="padding: 25px;">
            <h1 id="detTitle" style="margin: 0 0 10px; font-size: 32px;"></h1>
            <div style="color: #46d369; font-weight: 700; margin-bottom: 20px; font-size: 14px;">98% совпадение • 2024 • 16+</div>
            <p style="color: #ccc; font-size: 15px; line-height: 1.6; margin-bottom: 30px;">
                Захватывающая история теперь доступна в Glodeni. Бронируйте лучшие места прямо сейчас через наше приложение.
            </p>
            <button class="btn-play" style="width: 100%; justify-content: center; background: var(--red); color: white;" onclick="showScreen('booking')">Выбрать билеты</button>
        </div>
    </div>

    <div id="booking" class="screen">
        <div class="top-bar">
            <button class="back-btn" onclick="showScreen('details')"><i data-lucide="arrow-left"></i></button>
            <span style="font-weight: 700;">Выбор мест</span>
        </div>
        <div style="margin-top: 80px; text-align: center;">
            <div style="width: 80%; height: 4px; background: var(--red); margin: 0 auto; border-radius: 10px; box-shadow: 0 0 15px var(--red);"></div>
            <p style="font-size: 11px; color: #555; margin-top: 8px; letter-spacing: 2px;">ЭКРАН</p>
        </div>
        <div class="grid" id="seatsGrid"></div>
        
        <div style="margin-top: auto; padding: 20px 24px 40px; background: #121212; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: sticky; bottom: 0;">
            <div>
                <div style="font-size: 12px; color: #888;">Итого</div>
                <div style="font-size: 24px; font-weight: 900;">$<span id="price">0</span></div>
            </div>
            <button class="btn-play" style="background: var(--red); color: white; padding: 15px 40px; border-radius: 8px;" onclick="openModal()">Купить</button>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="payModal" class="modal">
        <div style="width: 40px; height: 4px; background: #333; border-radius: 10px; margin: -15px auto 25px;"></div>
        <i data-lucide="shield-check" size="48" color="#46d369" style="margin-bottom: 15px;"></i>
        <h2>Оплата</h2>
        <button class="btn-play" style="width: 100%; justify-content: center; margin-top: 20px;" onclick="alert('Билет куплен!'); location.reload();">Подтвердить</button>
        <p style="margin-top: 20px; font-size: 12px; color: #555;" onclick="closeModal()">Отмена</p>
    </div>

    <script>
        lucide.createIcons();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
            target.scrollTo(0,0);
        }

        function openDetails(img, title) {
            document.getElementById('detImg').style.backgroundImage = `url('${img}')`;
            document.getElementById('detTitle').innerText = title;
            showScreen('details');
        }

        function openModal() {
            document.getElementById('payModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('payModal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Сетка мест
        const grid = document.getElementById('seatsGrid');
        let totalCost = 0;
        for (let r = 0; r < 7; r++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let s = 0; s < 8; s++) {
                if (s === 4) { let gap = document.createElement('div'); gap.style.width = '16px'; row.appendChild(gap); }
                const seat = document.createElement('div');
                seat.className = 'seat';
                if (Math.random() < 0.2) seat.classList.add('occupied');
                else {
                    seat.onclick = function() {
                        this.classList.toggle('selected');
                        totalCost += this.classList.contains('selected') ? 25 : -25;
                        document.getElementById('price').innerText = totalCost;
                    }
                }
                row.appendChild(seat);
            }
            grid.appendChild(row);
        }
    </script>
</body>
</html>
