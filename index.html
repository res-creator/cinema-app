<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --red: #E50914; --bg: #000; --card: #141414; }
        
        html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #fff; height: 100%; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--bg); padding-bottom: 100px; box-sizing: border-box; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .top-bar { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); box-sizing: border-box; }
        .back-btn { cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; margin-right: 15px; border: none; color: white; }
        .logo { color: var(--red); font-weight: 900; font-size: 22px; flex-grow: 1; }

        /* HERO BANNER */
        .hero { 
            width: 100%; height: 65vh; 
            background: linear-gradient(to top, var(--bg), transparent 50%), url('main_hero.jpg') center top; 
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 30px; text-align: center;
        }
        .hero-title { font-size: 38px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }

        .btn-play { background: #fff; color: #000; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        /* ИСПРАВЛЕННЫЙ БЛОК СКРОЛЛА */
        .row-title { padding: 25px 20px 12px; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
        
        .movie-row { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 0 20px 10px; /* Отступы по бокам */
            scrollbar-width: none; /* Убираем полосу прокрутки */
        }
        .movie-row::-webkit-scrollbar { display: none; }

        /* КАРТОЧКИ: ТЕПЕРЬ ОНИ ШИРОКИЕ И НЕ СЖИМАЮТСЯ */
        .movie-card { 
            width: 145px; /* Фиксированная ширина */
            height: 215px; /* Пропорциональная высота */
            background: var(--card); 
            border-radius: 8px; 
            background-size: cover; 
            background-position: center; 
            flex-shrink: 0; /* ЗАПРЕТ НА СЖАТИЕ — самое важное! */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        /* Добавляем невидимый элемент в конце ряда, чтобы последний постер не прилипал к краю */
        .movie-row::after { content: ''; min-width: 10px; height: 1px; flex-shrink: 0; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0 30px; background: rgba(0,0,0,0.95); border-top: 1px solid #222; z-index: 90; }
        .nav-item { color: #757575; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="top-bar">
            <div class="logo">CinéCity</div>
            <i data-lucide="search" size="22"></i>
        </div>
        
        <div class="hero">
            <h1 class="hero-title">Дюна: Часть 2</h1>
            <button class="btn-play" onclick="openDetails('main_hero.jpg', 'Дюна: Часть вторая')">
                <i data-lucide="play" fill="black" size="20"></i> Билеты
            </button>
        </div>

        <div class="row-title">Сейчас в кино</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film1.jpg')" onclick="openDetails('film1.jpg', 'Оппенгеймер')"></div>
            <div class="movie-card" style="background-image: url('film2.jpg')" onclick="openDetails('film2.jpg', 'Бэтмен')"></div>
            <div class="movie-card" style="background-image: url('film3.jpg')" onclick="openDetails('film3.jpg', 'Джон Уик 4')"></div>
            <div class="movie-card" style="background-image: url('film4.jpg')" onclick="openDetails('film4.jpg', 'Человек-паук')"></div>
        </div>

        <div class="row-title">Популярно в Glodeni</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film5.jpg')" onclick="openDetails('film5.jpg', 'Интерстеллар')"></div>
            <div class="movie-card" style="background-image: url('film6.jpg')" onclick="openDetails('film6.jpg', 'Начало')"></div>
            <div class="movie-card" style="background-image: url('film7.jpg')" onclick="openDetails('film7.jpg', 'Бегущий по лезвию')"></div>
            <div class="movie-card" style="background-image: url('film8.jpg')" onclick="openDetails('film8.jpg', 'Аватар 2')"></div>
        </div>
        
        <div class="nav">
            <div class="nav-item active"><i data-lucide="home"></i><br>Главная</div>
            <div class="nav-item"><i data-lucide="compass"></i><br>Обзор</div>
            <div class="nav-item"><i data-lucide="user"></i><br>Профиль</div>
        </div>
    </div>

    <div id="details" class="screen">
        <div class="top-bar">
            <button class="back-btn" onclick="showScreen('home')"><i data-lucide="arrow-left" size="20"></i></button>
        </div>
        <div id="detImg" style="width: 100%; height: 45vh; background-size: cover; background-position: center;"></div>
        <div style="padding: 20px;">
            <h1 id="detTitle" style="margin: 0 0 10px; font-size: 28px;">Название</h1>
            <p style="color: #ccc; font-size: 14px; line-height: 1.5; margin-bottom: 25px;">Забронируйте билеты на лучшие места в нашем кинотеатре.</p>
            <button class="btn-play" style="width: 100%; justify-content: center; background: var(--red); color: white;" onclick="alert('Переход к выбору мест...')">Купить билет</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function openDetails(img, title) {
            document.getElementById('detImg').style.backgroundImage = `url('${img}')`;
            document.getElementById('detTitle').innerText = title;
            showScreen('details');
        }
    </script>
</body>
</html>
