<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Netflix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --netflix-red: #E50914;
            --bg-black: #000000;
            --card-gray: #141414;
        }

        body { 
            margin: 0; background: var(--bg-black); font-family: 'Roboto', sans-serif; 
            color: #fff; overflow-x: hidden; -webkit-font-smoothing: antialiased; 
        }

        /* АНИМАЦИЯ ПЕРЕХОДОВ */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            display: none; flex-direction: column; background: var(--bg-black);
            overflow-y: auto; padding-bottom: 100px;
        }
        .screen.active { display: flex; animation: netflixFade 0.3s ease; }
        @keyframes netflixFade { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER */
        .netflix-header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }
        .logo { color: var(--netflix-red); font-weight: 900; font-size: 24px; letter-spacing: -1px; }

        /* ГЛАВНЫЙ БАННЕР */
        .hero {
            width: 100%; height: 500px;
            background: linear-gradient(to top, var(--bg-black), transparent 50%), url('main_hero.jpg') center top;
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 20px;
        }
        .hero-btns { display: flex; gap: 15px; margin-top: 15px; }
        .btn-white { background: #fff; color: #000; border: none; padding: 10px 25px; border-radius: 4px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .btn-gray { background: rgba(81, 81, 81, 0.5); color: #fff; border: none; padding: 10px 25px; border-radius: 4px; font-weight: 700; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); }

        /* ЛЕНТЫ ФИЛЬМОВ (Scroll) */
        .row-title { padding: 20px 20px 10px; font-size: 18px; font-weight: 700; }
        .movie-row { 
            display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; 
            scrollbar-width: none; /* скрываем скролл */
        }
        .movie-row::-webkit-scrollbar { display: none; }
        .movie-card { 
            min-width: 110px; height: 160px; background: var(--card-gray); 
            border-radius: 4px; background-size: cover; background-position: center;
            flex-shrink: 0; cursor: pointer; transition: 0.2s;
        }
        .movie-card:active { transform: scale(0.9); }

        /* ЭКРАН ВЫБОРА МЕСТ (в стиле Netflix) */
        .booking-header { padding: 40px 20px 20px; display: flex; align-items: center; gap: 20px; }
        .grid { display: flex; flex-direction: column; gap: 8px; align-items: center; padding: 20px; }
        .row { display: flex; gap: 6px; }
        .seat { width: 30px; height: 30px; border: 1.5px solid #333; border-radius: 4px; }
        .seat.selected { background: var(--netflix-red); border-color: var(--netflix-red); }
        .seat.occupied { background: #1a1a1a; border: none; opacity: 0.2; }

        /* BOTTOM NAV */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around;
            padding: 10px 0 30px; background: #121212; border-top: 1px solid #222;
        }
        .nav-item { color: #808080; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="netflix-header">
            <div class="logo">CinéCity</div>
            <div style="display: flex; gap: 20px;">
                <i data-lucide="search"></i>
                <i data-lucide="user"></i>
            </div>
        </div>

        <div class="hero">
            <div style="font-size: 14px; font-weight: 700;">Премьера в Глодянах</div>
            <div class="hero-btns">
                <button class="btn-white" onclick="showScreen('booking')"><i data-lucide="play" fill="black"></i> Билеты</button>
                <button class="btn-gray"><i data-lucide="plus"></i> В список</button>
            </div>
        </div>

        <div class="row-title">Сейчас в кино</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film1.jpg')" onclick="showScreen('booking')"></div>
            <div class="movie-card" style="background-image: url('film2.jpg')"></div>
            <div class="movie-card" style="background-image: url('film3.jpg')"></div>
            <div class="movie-card" style="background-image: url('film4.jpg')"></div>
        </div>

        <div class="row-title">Рекомендуем вам</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film5.jpg')"></div>
            <div class="movie-card" style="background-image: url('film6.jpg')"></div>
            <div class="movie-card" style="background-image: url('film7.jpg')"></div>
            <div class="movie-card" style="background-image: url('film8.jpg')"></div>
        </div>

        <div class="row-title">Скоро в CinéCity</div>
        <div class="movie-row">
            <div class="movie-card" style="background-image: url('film9.jpg')"></div>
            <div class="movie-card" style="background-image: url('film10.jpg')"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active"><i data-lucide="home"></i>Главная</div>
            <div class="nav-item"><i data-lucide="layers"></i>Новинки</div>
            <div class="nav-item"><i data-lucide="download"></i>Загрузки</div>
            <div class="nav-item"><i data-lucide="menu"></i>Еще</div>
        </div>
    </div>

    <div id="booking" class="screen">
        <div class="booking-header">
            <i data-lucide="arrow-left" onclick="showScreen('home')"></i>
            <span style="font-weight: 700; font-size: 20px;">Выбор мест</span>
        </div>
        
        <div style="width: 80%; height: 4px; background: var(--netflix-red); margin: 20px auto; border-radius: 10px; box-shadow: 0 0 15px var(--netflix-red);"></div>
        <div style="text-align: center; font-size: 10px; color: #555; margin-bottom: 30px;">ЭКРАН</div>

        <div class="grid" id="seatsGrid"></div>

        <div style="position: fixed; bottom: 0; width: 100%; padding: 20px 20px 40px; background: #121212; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;">
            <div>
                <div style="font-size: 12px; color: #888;">Сумма</div>
                <div style="font-size: 24px; font-weight: 900;">$<span id="price">0</span></div>
            </div>
            <button class="btn-white" style="background: var(--netflix-red); color: #fff; padding: 15px 40px;" onclick="alert('Успешно забронировано!')">Купить</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Генерация сетки мест
        const grid = document.getElementById('seatsGrid');
        let totalPrice = 0;

        for (let r = 0; r < 7; r++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let s = 0; s < 8; s++) {
                if (s === 4) { // Проход посередине
                    let gap = document.createElement('div');
                    gap.style.width = '20px';
                    row.appendChild(gap);
                }
                const seat = document.createElement('div');
                seat.className = 'seat';
                
                // Случайно делаем места занятыми
                if (Math.random() < 0.2) {
                    seat.classList.add('occupied');
                } else {
                    seat.onclick = function() {
                        this.classList.toggle('selected');
                        totalPrice += this.classList.contains('selected') ? 15 : -15;
                        document.getElementById('price').innerText = totalPrice;
                    }
                }
                row.appendChild(seat);
            }
            grid.appendChild(row);
        }
    </script>
</body>
</html>
