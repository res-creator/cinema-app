<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéCity Glodeni</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0d0d0d; font-family: 'Outfit', sans-serif; color: #fff; overflow-x: hidden; }
        .screen { width: 100%; min-height: 100vh; display: none; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* Шапка */
        .home-header { padding: 20px 16px; display: flex; justify-content: space-between; align-items: center; }
        .home-logo { font-family: 'Playfair Display', serif; font-size: 22px; color: #c9a84c; }
        .home-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #c9a84c; display: flex; align-items: center; justify-content: center; color: #c9a84c; }
        
        /* Главный баннер */
        .hero-img { 
            width: 100%; height: 250px; 
            background: linear-gradient(to bottom, transparent, #0d0d0d), url('https://w0.peakpx.com/wallpaper/424/303/wallpaper-desktop-dune-2.jpg'); 
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 20px; box-sizing: border-box; 
        }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 28px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        /* Список фильмов */
        .section-title { padding: 20px 16px 10px; font-weight: 500; color: #ddd; }
        .movie-row { display: flex; gap: 15px; padding: 0 16px 20px; overflow-x: auto; scrollbar-width: none; }
        .movie-card { flex-shrink: 0; width: 130px; }
        .movie-poster { width: 130px; height: 180px; border-radius: 12px; background-size: cover; border: 1px solid #333; }
        
        /* Кнопка */
        .buy-btn { margin: 20px 16px; background: #c9a84c; color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .buy-btn:active { transform: scale(0.95); background: #b0913b; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: rgba(10,10,10,0.95); border-top: 0.5px solid #1e1e1e; backdrop-filter: blur(10px); }
        .nav-item { font-size: 20px; cursor: pointer; opacity: 0.5; }
        .nav-item.active { opacity: 1; color: #c9a84c; }

        /* Экран мест (простой пример) */
        .seats-grid { padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; justify-items: center; }
        .seat { width: 40px; height: 40px; background: #222; border-radius: 8px; border: 1px solid #444; }
        .seat.selected { background: #c9a84c; }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="home-header">
            <div>
                <div class="home-logo">CinéCity</div>
                <div style="font-size: 11px; color: #666;">Глодяны • MD</div>
            </div>
            <div class="home-avatar">АН</div>
        </div>
        
        <div class="hero-img">
            <div class="hero-title">Dune: Part Two</div>
        </div>

        <div class="section-title">Сейчас в кино</div>
        <div class="movie-row">
            <div class="movie-card">
                <div class="movie-poster" style="background-image: url('https://image.tmdb.org/t/p/w500/8GxvA9zDZ9G0QZ8vGfS0Soxp0Ac.jpg');"></div>
                <div style="font-size: 13px; margin-top: 8px; font-weight: 500;">Oppenheimer</div>
            </div>
            <div class="movie-card">
                <div class="movie-poster" style="background-image: url('https://image.tmdb.org/t/p/w500/7YpT707pZ86p69686868686868.jpg'); background-color: #222;"></div>
                <div style="font-size: 13px; margin-top: 8px; font-weight: 500;">Poor Things</div>
            </div>
        </div>

        <button class="buy-btn" onclick="showSeats()">Купить билет</button>

        <div class="bottom-nav">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">🎬</div>
            <div class="nav-item">🎫</div>
            <div class="nav-item">👤</div>
        </div>
    </div>

    <div id="seats" class="screen">
        <div class="home-header">
            <div onclick="showHome()" style="cursor:pointer; color: #c9a84c;">← Назад</div>
            <div class="home-logo">Выбор мест</div>
            <div></div>
        </div>
        <div style="text-align:center; color: #666; font-size: 12px; margin-top: 20px;">ЭКРАН</div>
        <div style="height: 4px; background: #c9a84c; margin: 10px 40px; border-radius: 2px; box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);"></div>
        
        <div class="seats-grid">
            <div class="seat" onclick="this.classList.toggle('selected')"></div>
            <div class="seat" onclick="this.classList.toggle('selected')"></div>
            <div class="seat" onclick="this.classList.toggle('selected')"></div>
            <div class="seat" onclick="this.classList.toggle('selected')"></div>
            <div class="seat" onclick="this.classList.toggle('selected')"></div>
            </div>

        <button class="buy-btn" style="margin-top:auto; margin-bottom: 80px;">Подтвердить выбор</button>
    </div>

    <script>
        function showSeats() {
            document.getElementById('home').classList.remove('active');
            document.getElementById('seats').classList.add('active');
            window.scrollTo(0,0);
        }
        function showHome() {
            document.getElementById('seats').classList.remove('active');
            document.getElementById('home').classList.add('active');
        }
    </script>
</body>
</html>
